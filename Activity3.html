<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2>Basic progress Bar</h2>
        <p>To creat a default progress bar, add a progress class to a container element and the progress-bar class to its child element. use the css width properly to set the width of the progress bar:</p>
        <div class="progress">
            <div class="progress-bar" style="width: 70%">70%</div>
        </div>

    </div>

    
</body>
</html>
